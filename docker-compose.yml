services:
  db:
    image: postgres:16-alpine
    container_name: ai-stock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stock_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stock_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
